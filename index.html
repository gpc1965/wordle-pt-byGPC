<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Wordle PT Online</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-container">
    <header>
      <h1>WORDLE PT</h1>
    </header>

    <main>
      <div id="board" class="board"></div>
      <div id="message" class="message"></div>
    </main>

    <section id="keyboard" class="keyboard"></section>
  </div>

  <audio id="snd-key" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"></audio>
  <audio id="snd-win" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
  <audio id="snd-lose" src="https://actions.google.com/sounds/v1/cartoon/metal_thud_and_clang.ogg"></audio>

  <script src="script.js"></script>
</body>
</html>
